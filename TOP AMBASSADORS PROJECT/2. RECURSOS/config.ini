[GERAL]
warehouse_id      = FC locale
download_timeout  = 120
min_opportunities = 100
# ============================================================
#  VERSAO DEMO / PORTFOLIO  -  "Site of Alefcas"
#  As URLs abaixo apontam para os sites HTML locais (falsos)
#  na pasta "SITE OF ALEFCAS". O prefixo  local:  e resolvido
#  em tempo de execucao para um caminho file:/// absoluto,
#  tornando o projeto portavel (funciona em qualquer PC apos
#  clonar do GitHub). NENHUM dado real da Amazon e usado.
# ============================================================
url_roster        = local:roster.html
url_associados    = local:onboarding.html
url_dados         = local:quicksight.html
url_atlas         = local:atlas.html

[EMAIL]
# DEMO / PORTFOLIO: o email NAO e enviado pelo Outlook.
# Ele e apenas gerado e mostrado no terminal, com a opcao de abrir o HTML.
# metodo mantido por compatibilidade (valor ignorado no envio).
metodo    = pwa
# gerar_png: gera um screenshot PNG do email (usa o Firefox/Selenium).
# Na demo deixamos false para nao depender do navegador nesta etapa.
gerar_png = false

[ARQUIVOS]
planilha_associados     = associados.xlsx
planilha_dados          = dados_funcionarios.xlsx
planilha_atlas          = ExtracaoATLAS.xlsx
planilha_saida_completo = resultado_completo.xlsx
planilha_saida_rc_cret  = rc_cret.xlsx
planilha_saida_final    = ranking_final.xlsx

[QUALIDADE]
quality_top_max    = 30
quality_bottom_min = 100

[PRODUTIVIDADE]
prod_top_minimo    = 90
prod_bottom_maximo = 60

[REGRAS_NEGOCIO]
